---
- name: Setup Apple Silicon macOS Developer Environment
  hosts: localhost
  connection: local
  gather_facts: false

  # Ensure Homebrew and standard system binaries are in PATH
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:{{ lookup('env', 'PATH') }}"

  vars:
    # Default Python virtual environment path
    venv_path: "{{ lookup('env', 'HOME') }}/.venv"

    # CLI Tools (Formulae)
    homebrew_formulae:
      - gh                       # GitHub CLI
      - uv                       # Fast Python package installer & resolver
      - podman                   # Podman CLI

    # GUI Applications & Cask Tools (Casks)
    homebrew_casks:
      - iterm2                  # iTerm2 Terminal
      - github                  # GitHub Desktop
      - cursor                  # Cursor AI Editor
      - claude                  # Claude Desktop App
      - claude-code             # Claude Code CLI Agent
      - google-cloud-sdk        # Google Cloud CLI (gcloud)
      - podman-desktop          # Podman Desktop

    # Python packages installed into venv_path via uv
    python_packages:
      - "headroom-ai[all]"

    # Persistent Headroom proxy (runs from venv via launchd)
    headroom_port: 8787
    headroom_backend: anthropic
    headroom_mode: token

  tasks:
    - name: Check for Homebrew installation
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: brew_check

    - name: Install Homebrew
      ansible.builtin.shell: >
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not brew_check.stat.exists

    - name: Update Homebrew
      ansible.builtin.command: brew update
      changed_when: false

    - name: Get installed Homebrew formulae
      ansible.builtin.command: brew list --formula -1
      register: installed_formulae
      changed_when: false

    - name: Install CLI packages (Formulae)
      ansible.builtin.command:
        cmd: "brew install {{ item }}"
      loop: "{{ homebrew_formulae }}"
      when: item not in installed_formulae.stdout_lines

    - name: Get installed Homebrew casks
      ansible.builtin.command: brew list --cask -1
      register: installed_casks
      changed_when: false

    - name: Install macOS Applications & Casks
      ansible.builtin.command:
        cmd: "brew install --cask {{ item }}"
      loop: "{{ homebrew_casks }}"
      when: item not in installed_casks.stdout_lines

    - name: Check for default Python virtual environment
      ansible.builtin.stat:
        path: "{{ venv_path }}"
      register: venv_check

    - name: Create default Python virtual environment with uv
      ansible.builtin.command:
        cmd: "uv venv {{ venv_path }}"
      when: not venv_check.stat.exists

    - name: Install Python packages into virtual environment
      ansible.builtin.command:
        cmd: "uv pip install --python {{ venv_path }}/bin/python {{ item }}"
      loop: "{{ python_packages }}"
      register: uv_pip_res
      changed_when: "'Installed' in uv_pip_res.stdout or 'Downloading' in uv_pip_res.stdout"

    - name: Check Headroom persistent deployment status
      ansible.builtin.command:
        cmd: "{{ venv_path }}/bin/headroom install status"
      register: headroom_status
      changed_when: false
      failed_when: false

    - name: Deploy persistent Headroom proxy from virtual environment
      ansible.builtin.command:
        argv:
          - "{{ venv_path }}/bin/headroom"
          - deploy
          - --no-docker
          - --port
          - "{{ headroom_port }}"
          - --backend
          - "{{ headroom_backend }}"
          - --mode
          - "{{ headroom_mode }}"
      when: headroom_status.rc != 0 or 'No deployment profile' in (headroom_status.stderr | default('')) or 'No deployment profile' in (headroom_status.stdout | default(''))

